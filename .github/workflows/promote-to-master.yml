name: Promote to Master

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  promote:
    name: Create Release PR to Master
    runs-on: ubuntu-latest
    # Use 'staging' environment to access GH_TOKEN secret for auto-merge
    environment: staging
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout staging
        uses: actions/checkout@v6
        with:
          ref: staging
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Check if promotion needed
        id: check
        run: |
          git fetch origin master
          # Compare tree states directly — if the file trees are identical
          # (ignoring package.json version), there's nothing to promote
          DIFF_COUNT=$(git diff origin/master origin/staging -- . ':!package.json' ':!package-lock.json' | wc -l)
          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No file differences between staging and master (ignoring version), skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Staging has differences to promote ($DIFF_COUNT diff lines)"
          fi

      - name: Determine bump type from merged PR labels
        if: steps.check.outputs.skip != 'true'
        id: bump_type
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --state merged --base staging --limit 1 --json number -q '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view $PR_NUMBER --json labels -q '.labels[].name')
            echo "PR #$PR_NUMBER labels: $LABELS"
            if echo "$LABELS" | grep -q "version-major"; then
              echo "type=major" >> $GITHUB_OUTPUT
              echo "Detected major version bump"
            elif echo "$LABELS" | grep -q "version-minor"; then
              echo "type=minor" >> $GITHUB_OUTPUT
              echo "Detected minor version bump"
            else
              echo "type=patch" >> $GITHUB_OUTPUT
              echo "Defaulting to patch version bump"
            fi
          else
            # Fallback: check commit messages for conventional commits
            COMMITS=$(git log origin/master..staging --pretty=format:"%s")
            if echo "$COMMITS" | grep -qE "^feat.*!:|BREAKING CHANGE"; then
              echo "type=major" >> $GITHUB_OUTPUT
              echo "Detected major version bump from commits"
            elif echo "$COMMITS" | grep -qE "^feat"; then
              echo "type=minor" >> $GITHUB_OUTPUT
              echo "Detected minor version bump from commits"
            else
              echo "type=patch" >> $GITHUB_OUTPUT
              echo "Defaulting to patch version bump"
            fi
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump version and create release branch
        if: steps.check.outputs.skip != 'true'
        id: version
        run: |
          # Read version from MASTER (production), not staging
          # This ensures we bump from the current production version
          CURRENT=$(git show origin/master:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8')).version")
          echo "Current version (from master): $CURRENT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump_type.outputs.type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          BRANCH="release/v${NEW}"
          echo "New version: $NEW"
          echo "Release branch: $BRANCH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create release branch from master (clean base for PR)
          git checkout -b "$BRANCH" origin/master

          # Squash-merge staging: compares final tree states, not individual commits.
          # This handles diverged histories (cherry-picks, manual merges) cleanly.
          # -X theirs resolves any conflicts by taking staging's version (latest code).
          git merge --squash -X theirs staging

          # Reset version files to master's version (we bump separately below)
          git checkout origin/master -- package.json package-lock.json

          # Check if there are any real changes after excluding version files
          if git diff --cached --quiet; then
            echo "No new changes to promote (staging matches master)"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Commit the squashed changes with a summary of what's included
          CHANGE_SUMMARY=$(git log origin/master..staging --pretty=format:'- %s' --no-merges | head -20)
          git commit -m "Release v${NEW}

          Changes from staging:
          ${CHANGE_SUMMARY}"

          # Bump version in package.json
          npm version $NEW --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: bump version to $NEW"

          git push origin "$BRANCH" --force

          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create PR to master with auto-merge
        if: steps.check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="${{ steps.version.outputs.branch }}"

          # Check if PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base master --json number,url -q '.[0]' || echo "")

          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            PR_NUMBER=$(echo "$EXISTING_PR" | jq -r '.number')
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.url')
            echo "PR #$PR_NUMBER already exists for $BRANCH, reusing it"

            # Update PR body with latest changes
            gh pr edit "$PR_NUMBER" --body "Automated release PR from staging.

          **Version:** ${VERSION}
          **Bump type:** ${{ steps.bump_type.outputs.type }}

          ### Changes included
          $(git log origin/master..origin/staging --pretty=format:'- %s' | head -20)

          ---
          This PR will auto-merge when checks pass."
          else
            # Create new PR
            PR_URL=$(gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "Release v${VERSION}" \
              --body "Automated release PR from staging.

          **Version:** ${VERSION}
          **Bump type:** ${{ steps.bump_type.outputs.type }}

          ### Changes included
          $(git log origin/master..origin/staging --pretty=format:'- %s' | head -20)

          ---
          This PR will auto-merge when checks pass.")

            echo "Created PR: $PR_URL"
            # Extract PR number from URL
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          fi

          # Small delay to ensure PR is ready
          sleep 2

          # Enable auto-merge with rebase (repo only allows rebase merges)
          echo "Enabling auto-merge for PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --auto --rebase

          echo "### Release PR Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${BRANCH}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** ${PR_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Auto-merge enabled" >> $GITHUB_STEP_SUMMARY
