name: Promote to Master

on:
  push:
    branches: [staging]

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  check-promotion:
    name: Check if Promotion Needed
    runs-on: ubuntu-latest
    outputs:
      should_promote: ${{ steps.check.outputs.should_promote }}
      version_bump: ${{ steps.version.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commits ahead of master
        id: check
        run: |
          git fetch origin master
          AHEAD=$(git rev-list --count origin/master..origin/staging)
          echo "Commits ahead of master: $AHEAD"
          if [ "$AHEAD" -gt 0 ]; then
            echo "should_promote=true" >> $GITHUB_OUTPUT
          else
            echo "should_promote=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine version bump
        id: version
        if: steps.check.outputs.should_promote == 'true'
        run: |
          # Check merged PR labels for version bump type
          # Default to patch if no label found
          BUMP="patch"

          # Get recent commits to determine bump type
          COMMITS=$(git log origin/master..origin/staging --pretty=format:"%s")

          if echo "$COMMITS" | grep -qE "^feat.*!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat"; then
            BUMP="minor"
          fi

          echo "Version bump type: $BUMP"
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

  promote:
    name: Create Release PR
    runs-on: ubuntu-latest
    needs: check-promotion
    if: needs.check-promotion.outputs.should_promote == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ needs.check-promotion.outputs.version_bump }}"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Current: $CURRENT -> New: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v$VERSION"

          git checkout -b "$BRANCH"

          # Update package.json version
          npm version "$VERSION" --no-git-tag-version

          # Commit version bump
          git add package.json package-lock.json
          git commit -m "chore: bump version to $VERSION"

          # Push release branch
          git push origin "$BRANCH"

      - name: Create Pull Request
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v$VERSION"

          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Release v$VERSION" \
            --body "## Release v$VERSION

          This PR promotes staging changes to master.

          ### Changes included
          $(git log origin/master..origin/staging --pretty=format:'- %s' | head -20)

          ---
          *Auto-generated by promote-to-master workflow*"
